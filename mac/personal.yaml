defaults:
  brew:
    adopt_casks: true
    auto_trust_taps: true

steps:
  - brew:
      formula:
        # stuff for youtube-dl
        - yt-dlp
        - aria2
        - ffmpeg
        - libdvdcss
      cask:
        - intellij-idea
        - obs
        # photography and media
        - affinity
        # Plex desktop
        - plex
  - brew:
      # This is a separate brew directive so it can be skipped in CI.
      # `mas` actions should never be run in CI since they depend on a
      # Mac App Store login.
      skip_in_ci: true
      mas:
        Flighty: 1358823008
        Darkroom: 953286746
        # Chat & Communication
        Wechat: 836500024
        KakaoTalk: 869223134
        LINE: 539883307
        Telegram: 747648890
        WhatsApp: 310633997
        # Office
        Excel: 462058435
        # Who really needs this?
        # PowerPoint: 462062816
        Word: 462054704
        # Apple Pro apps
        Compressor: 424390742
        Final Cut Pro: 424389933
        Logic Pro: 634148309
